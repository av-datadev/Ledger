<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#182B3A" />
    <meta
      name="description"
      content="Brick Flow — offline-first construction expense tracker"
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Brick Flow</title>
    <script>
      // Apply the saved theme (or the OS preference) before first paint, so
      // there's no flash of the wrong mode on launch.
      (function () {
        try {
          var t = localStorage.getItem("hl-theme");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", t === "dark" ? "#0b1015" : "#182B3A");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
